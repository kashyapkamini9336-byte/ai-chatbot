<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Chatbot — Demo</title>
  <style>
    :root{
      --bg:#0f1724; --card:#0b1220; --accent:#7c3aed; --muted:#9aa4b2; --glass: rgba(255,255,255,0.04);
      --maxw:720px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; padding:24px; background:#071124; color:#e6eef6; display:flex;
      align-items:center; justify-content:center; height:100vh;
    }

    .app{
      width:100%; max-width:var(--maxw); background:rgba(255,255,255,0.03);
      border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,0.05);
    }

    header{display:flex; gap:12px; align-items:center; padding:18px;}
    .logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#2dd4bf); display:flex; align-items:center; justify-content:center; font-weight:700; color:white;}

    .chat-wrap{display:flex; flex-direction:column; height:60vh; padding:18px;}
    .messages{flex:1; overflow:auto; display:flex; flex-direction:column; gap:12px;}

    .msg{max-width:80%; padding:12px 14px; border-radius:12px; line-height:1.4}
    .user{align-self:flex-end; background:rgba(255,255,255,0.05);}
    .bot{align-self:flex-start; background:rgba(124,58,237,0.15);}

    .composer{display:flex; gap:8px; padding-top:12px;}
    textarea{flex:1; min-height:44px; max-height:120px; resize:none;
      padding:10px; border-radius:10px; border:none; outline:none; background:rgba(255,255,255,0.05); color:white;}

    button.send{background:linear-gradient(90deg,var(--accent),#06b6d4); border:0; color:white; padding:10px 14px; border-radius:10px; cursor:pointer;}

  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="logo">AI</div>
      <h1>AI Chatbot (Demo)</h1>
    </header>

    <section class="chat-wrap">
      <div class="messages" id="messages"></div>

      <div class="composer">
        <textarea id="userInput" placeholder="Write a message..."></textarea>
        <button class="send" id="sendBtn">Send</button>
      </div>
    </section>
  </main>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    function appendMessage(text, who="bot"){
      const el = document.createElement("div");
      el.className = "msg " + who;
      el.innerHTML = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Send the message to the backend server at /chat which forwards to Jemin
    async function sendMessage(){
      const text = inputEl.value.trim();
      if(!text) return;

      appendMessage(text, "user");
      inputEl.value = "";

      const typingEl = document.createElement("div");
      typingEl.className = "msg bot";
      typingEl.innerHTML = "<div class='typing'><span class='dot'></span><span class='dot'></span><span class='dot'></span></div>";
      messagesEl.appendChild(typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const res = await fetch("http://localhost:3000/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        if (messagesEl.contains(typingEl)) messagesEl.removeChild(typingEl);
        appendMessage(data.reply || "(no reply)", "bot");

      } catch (err) {
        if (messagesEl.contains(typingEl)) messagesEl.removeChild(typingEl);
        appendMessage("Server error. " + (err.message || err), "bot");
      }
    }

    sendBtn.onclick = sendMessage;

    inputEl.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendMessage();
      }
    });

    appendMessage("Hello! I am your chatbot — connected to the backend.", "bot");
  </script>
</body>
</html>
